<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luum — All Projects</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<script>
(function(){
  var s=localStorage.getItem('luum-theme');
  var t=(s==='dark'||s==='light')?s:'light';
  if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ══ TOKENS ══ */
:root {
  --bg:    #F5F5F5;
  --sur:   #EFEFEF;
  --bdr:   #E9E8E8;
  --bdr2:  #D1D5DB;
  --tx:    #111827;
  --sub:   #6B7280;
  --mu:    #9CA3AF;
  --acc:   #8361FF;
  --acc-f: rgba(131,97,255,0.08);
  --fa:    #F9FAFB;
  --nav-act-bg: #111827;
  --nav-act-tx: #FFFFFF;
  --nav-ho-bg:  #F3F4F6;
}
[data-theme="dark"] {
  --bg:    #09090D;
  --sur:   #111118;
  --bdr:   rgba(255,255,255,0.08);
  --bdr2:  rgba(255,255,255,0.14);
  --tx:    #F0EDE8;
  --sub:   rgba(240,237,232,0.55);
  --mu:    rgba(240,237,232,0.32);
  --fa:    rgba(255,255,255,0.04);
  --nav-act-bg: #8361FF;
  --nav-act-tx: #FFFFFF;
  --nav-ho-bg:  rgba(255,255,255,0.05);
}

html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--tx);
  font-family: 'Inter', 'Pretendard', -apple-system, sans-serif;
  font-size: 14px;
  display: flex;
  padding: 10px 10px 10px 0;
  gap: 10px;
  transition: background .2s, color .2s;
}

/* ══ SIDEBAR ══ */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  height: 100vh;
  background: none;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .22s cubic-bezier(.4,0,.2,1);
  position: relative;
  z-index: 20;
}
.sidebar.col { width: 52px; }

/* workspace header */
.sb-ws {
  height: 52px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  overflow: hidden;
  white-space: nowrap;
}
.ws-wm { display: block; }
[data-theme="dark"] .ws-wm path[fill="#111827"] { fill: #F0EDE8; }
.sidebar.col .ws-wm { display: none; }
.sidebar.col .sb-ws { justify-content: center; }

/* nav */
.sb-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px; display: flex; flex-direction: column; gap: 1px; }
.ni {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 7px;
  font-size: 13.5px; font-weight: 400; color: var(--sub);
  cursor: pointer; border: none; background: none; width: 100%;
  text-align: left; font-family: inherit;
  white-space: nowrap; overflow: hidden;
  transition: background .1s, color .1s;
}
.ni:hover { background: var(--nav-ho-bg); color: var(--tx); }
.ni.act { background: var(--nav-act-bg); color: var(--nav-act-tx); }
.sidebar.col .ni { justify-content: center; padding: 9px 0; }
.sidebar.col .ni-lbl { display: none; }
.ni-ico { width: 15px; height: 15px; flex-shrink: 0; }

/* divider + section label */
.sb-div { height: 1px; background: var(--bdr); margin: 6px 0; }
.sb-sec-lbl {
  font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; color: var(--mu);
  padding: 6px 10px 3px;
  white-space: nowrap; overflow: hidden;
}
.sidebar.col .sb-sec-lbl { display: none; }
.sb-empty { font-size: 12px; color: var(--mu); padding: 5px 10px; white-space: nowrap; overflow: hidden; }
.sidebar.col .sb-empty { display: none; }

/* bottom */
.sb-bot { flex-shrink: 0; padding: 8px; display: flex; flex-direction: column; gap: 3px; }

/* user card — banner 구조 그대로 */
.sb-user {
  background: var(--fa); border-radius: 8px;
  border: 1px solid var(--bdr);
  padding: 10px 11px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background .12s, border-color .12s; overflow: hidden;
}
.sb-user:hover { background: var(--nav-ho-bg); border-color: var(--bdr2); }
[data-theme="dark"] .sb-user { border-color: var(--bdr); }
[data-theme="dark"] .sb-user:hover { border-color: var(--bdr2); }
.u-av {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg,#8361FF,#5B3FD4);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff;
}
.u-info { display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.u-name { font-size: 12px; font-weight: 600; color: var(--tx); white-space: nowrap; }
.u-email { font-size: 11px; color: var(--mu); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar.col .sb-user { justify-content: center; padding: 10px 0; border: none; background: none; }
.sidebar.col .sb-user:hover { background: var(--nav-ho-bg); }
.sidebar.col .u-info { display: none; }

/* theme row */
.sb-tf { display: flex; align-items: center; padding: 4px 4px 10px; }
.sidebar.col .sb-tf { justify-content: center; }
.th-row { display: flex; gap: 1px; background: #F3F4F6; border-radius: 6px; padding: 2px; width: 100%; }
[data-theme="dark"] .th-row { background: rgba(255,255,255,0.06); }
.tt-btn {
  flex: 1; height: 32px; border: none; background: none; border-radius: 4px;
  cursor: pointer; color: var(--mu); display: flex; align-items: center; justify-content: center;
  transition: background .1s, color .1s;
}
.tt-btn:hover { color: var(--tx); }
.tt-btn.on { background: #FFFFFF; color: var(--tx); box-shadow: 0 1px 2px rgba(0,0,0,.1); }
[data-theme="dark"] .tt-btn.on { background: rgba(255,255,255,0.12); }
.sidebar.col .th-row { display: none; }

/* fold button — lives in sb-ws */
.sb-tog {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--bdr);
  background: none; display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--mu); transition: background .1s, color .1s; flex-shrink: 0;
  margin-left: auto;
}
.sb-tog:hover { background: var(--nav-ho-bg); color: var(--tx); }

/* ══ MAIN ══ */
.main { flex: 1; height: 100%; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; background: var(--sur); border-radius: 12px; }

.pg-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 0;
  flex-shrink: 0;
}
.pg-greeting { font-size: 13px; font-weight: 500; color: var(--sub); }
.pg-greeting strong { color: var(--tx); font-weight: 600; }
.pg-profile-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid var(--bdr);
  background: var(--fa);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: border-color .12s, background .12s;
  position: relative;
}
.pg-profile-btn:hover { border-color: var(--bdr2); background: var(--bdr); }
.pg-profile-btn svg { color: var(--sub); }

.pg-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px 16px;
  flex-shrink: 0;
}
.pg-title { font-size: 20px; font-weight: 700; color: var(--tx); letter-spacing: -.03em; font-family: 'Outfit', 'Pretendard', sans-serif; }
.pg-acts { display: flex; align-items: center; gap: 8px; }
.btn-new-prj {
  display: flex; align-items: center; gap: 6px;
  height: 34px; padding: 0 14px;
  background: var(--acc); color: #fff;
  border: none; border-radius: 7px;
  font-family: inherit; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .12s;
}
.btn-new-prj:hover { opacity: .88; }
.btn-del {
  height: 34px; padding: 0 14px;
  background: none; border: 1px solid var(--bdr);
  border-radius: 7px; font-family: inherit; font-size: 13px;
  color: var(--sub); cursor: pointer; transition: border-color .12s, color .12s;
}
.btn-del:hover { border-color: var(--bdr2); color: var(--tx); }

.pg-content { padding: 0 28px 32px; }

/* filter tabs */
.ft-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.ft {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 7px;
  border: 1px solid var(--bdr);
  background: none; color: var(--sub);
  font-size: 13px; font-weight: 400; font-family: inherit;
  cursor: pointer; transition: all .12s;
}
.ft:hover { border-color: var(--bdr2); color: var(--tx); }
.ft.on { background: var(--acc-f); border-color: rgba(131,97,255,.25); color: var(--acc); font-weight: 500; }
.ft-n { font-size: 10.5px; font-weight: 600; background: #F3F4F6; color: var(--mu); padding: 1px 5px; border-radius: 4px; }
[data-theme="dark"] .ft-n { background: rgba(255,255,255,0.06); }
.ft.on .ft-n { background: rgba(131,97,255,.16); color: var(--acc); }

/* project grid */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 12px; }

/* project card */
.pc {
  background: #FFFFFF;
  border: 1px solid var(--bdr);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s, transform .12s;
}
[data-theme="dark"] .pc { background: var(--sur); }
.pc:hover {
  border-color: rgba(131,97,255,.3);
  box-shadow: 0 4px 20px rgba(0,0,0,.07), 0 1px 6px rgba(0,0,0,.04);
  transform: translateY(-1px);
}

/* card thumbnail */
.pc-thumb {
  height: 140px;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.pc-thumb-inner {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  opacity: .45;
}
.pc-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
.pc-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pc-tag {
  font-size: 10.5px; font-weight: 500; letter-spacing: .04em;
  padding: 2px 8px; border-radius: 5px; text-transform: uppercase; flex-shrink: 0;
}
.t-dsn { background: rgba(192,38,211,.09); color: #C084FC; }
.t-eng { background: rgba(96,165,250,.1);  color: #60A5FA; }
.t-prd { background: rgba(251,191,36,.1);  color: #F59E0B; }
.t-mkt { background: rgba(52,211,153,.1);  color: #34D399; }
.pc-st { font-size: 11.5px; font-weight: 500; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
.s-act  { color: #10B981; }
.s-pro  { color: #60A5FA; }
.s-pln  { color: #F59E0B; }
.s-rev  { color: #8361FF; }
.s-don  { color: var(--mu); }
.pc-name { font-size: 14.5px; font-weight: 600; color: var(--tx); letter-spacing: -.02em; line-height: 1.35; }
.pc-meta { font-size: 12px; color: var(--mu); }
.pbar { height: 3px; background: #F3F4F6; border-radius: 2px; overflow: hidden; }
[data-theme="dark"] .pbar { background: rgba(255,255,255,0.08); }
.pfill { height: 100%; border-radius: 2px; background: var(--acc); transition: width .4s; }
.pc-bot { display: flex; align-items: center; justify-content: space-between; }
.avs { display: flex; }
.av {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--sur);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; color: #fff;
  margin-left: -5px; flex-shrink: 0;
}
.av:first-child { margin-left: 0; }
.pct { font-size: 12px; font-weight: 600; color: var(--mu); font-variant-numeric: tabular-nums; }

/* thumb gradients */
.th-dsn { background: linear-gradient(135deg,rgba(192,38,211,.07),rgba(131,97,255,.07)); }
.th-eng { background: linear-gradient(135deg,rgba(96,165,250,.08),rgba(59,130,246,.06)); }
.th-prd { background: linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.06)); }
.th-mkt { background: linear-gradient(135deg,rgba(52,211,153,.08),rgba(16,185,129,.06)); }
</style>
</head>
<body>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sb">

  <nav class="sb-nav">
    <button class="ni act" onclick="goToPage('projects')">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="8" height="8" rx="1"/><rect x="14" y="3" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/></svg>
      <span class="ni-lbl">All Projects</span>
    </button>
    <button class="ni" onclick="goToPage('trash')">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      <span class="ni-lbl">Trash</span>
    </button>
    <button class="ni" onclick="goToPage('admin')">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
      <span class="ni-lbl">Admin</span>
    </button>
    <button class="ni" onclick="goToPage('billing')">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span class="ni-lbl">Plan &amp; Billing</span>
    </button>
    <button class="ni" onclick="goToPage('notifications')">
      <svg class="ni-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="ni-lbl">Notifications</span>
    </button>

    <div class="sb-div"></div>
    <div class="sb-sec-lbl">Favorites</div>
    <div class="sb-empty">No favorited projects.</div>
  </nav>

</aside>

<!-- ══ MAIN ══ -->
<main class="main">

  <div class="pg-head">
    <h1 class="pg-title">All Projects</h1>
    <div class="pg-acts">
      <button class="btn-new-prj">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Project
      </button>
      <button class="btn-del">Delete Selected</button>
    </div>
  </div>

  <div class="pg-content">

    <div class="ft-row">
      <button class="ft on" onclick="setFilter(this,'all')">All <span class="ft-n">2</span></button>
      <button class="ft" onclick="setFilter(this,'active')">Active <span class="ft-n">2</span></button>
      <button class="ft" onclick="setFilter(this,'review')">Review <span class="ft-n">0</span></button>
      <button class="ft" onclick="setFilter(this,'planning')">Planning <span class="ft-n">0</span></button>
      <button class="ft" onclick="setFilter(this,'done')">Done <span class="ft-n">0</span></button>
    </div>

    <div class="pgrid" id="pg">

      <div class="pc" data-s="active" onclick="goToProject()">
        <div class="pc-thumb th-dsn">
          <div class="pc-thumb-inner">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(192,38,211,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h4M9 15h2"/></svg>
          </div>
        </div>
        <div class="pc-body">
          <div class="pc-top"><div class="pc-tag t-dsn">Design</div><div class="pc-st s-act">● Active</div></div>
          <div class="pc-name">edencrew.com Renewal</div>
          <div class="pc-meta">Modified 5 min ago</div>
          <div class="pbar"><div class="pfill" style="width:65%"></div></div>
          <div class="pc-bot">
            <div class="avs">
              <div class="av" style="background:linear-gradient(135deg,#8361FF,#5B3FD4)">B</div>
              <div class="av" style="background:linear-gradient(135deg,#EC4899,#DB2777)">J</div>
              <div class="av" style="background:linear-gradient(135deg,#F59E0B,#D97706)">K</div>
            </div>
            <div class="pct">65%</div>
          </div>
        </div>
      </div>

      <div class="pc" data-s="active" onclick="goToProject()">
        <div class="pc-thumb th-eng">
          <div class="pc-thumb-inner">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(96,165,250,0.35)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          </div>
        </div>
        <div class="pc-body">
          <div class="pc-top"><div class="pc-tag t-eng">Engineering</div><div class="pc-st s-pro">● Active</div></div>
          <div class="pc-name">Untitled</div>
          <div class="pc-meta">Modified Jun 26, 2026</div>
          <div class="pbar"><div class="pfill" style="width:40%"></div></div>
          <div class="pc-bot">
            <div class="avs">
              <div class="av" style="background:linear-gradient(135deg,#8361FF,#5B3FD4)">B</div>
              <div class="av" style="background:linear-gradient(135deg,#3B82F6,#2563EB)">S</div>
            </div>
            <div class="pct">40%</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="luum-sidebar.js"></script>
<script>
function applyTheme(p) { LuumSidebar.applyTheme(p); }
function toggleSB() { LuumSidebar.toggleFold(); }

function goToProject() { location.href = 'project-dashboard.html'; }
function goToPage(p) {}


function setFilter(el, s) {
  document.querySelectorAll('.ft').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  document.querySelectorAll('.pc').forEach(function(c){
    if (!c.dataset.s) return;
    c.style.display = (s === 'all' || c.dataset.s === s) ? '' : 'none';
  });
}

LuumSidebar.init('#sb', { foldable: true, showUser: true, userName: 'Brian', userEmail: 'brian@edencrew.com' });
</script>
</body>
</html>
